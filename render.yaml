services:
  - type: web
    name: resumeshield-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_PER_HOUR
        value: "10"
      - key: RATE_LIMIT_PER_DAY
        value: "50"
    healthCheckPath: /api/v1/health
